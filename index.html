<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playwrite+GB+J&display=swap');

    body {
      background: linear-gradient(135deg, #ff9f32 0%, #ffffff 150%);
      margin: 0;
      padding: 0;
      font-family: sans-serif;
    }

    .btn {
      border: none;
      color: rgb(0, 0, 0);
      padding: 10px 10px;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      font-size: 22px;
      margin: 10px 5px;
      cursor: pointer;
      border-radius: 25px;
      border: 2px solid #BAC095;
      transition: background-color 0.2s ease;
    }

    .navbar {
      background: linear-gradient(135deg, #ff9f32 0%, #ffffff 200%);
      padding: 15px 20px;
      display: flex;
      flex-direction: row; 
      justify-content: flex-start; 
      align-items: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
      margin-bottom: 30px;
      border-radius: 25px;
    }

    .nav-logo {
        font-size: 20px;
        font-weight: bold;
        color: #ffffff;
        white-space: nowrap;
    }

    
    .nav-search {
        display: flex; 
        align-items: center;
        width: 35%; 
        margin-left: auto;     
        margin-right: 40px;   
    }

    .search-box {
        display: flex;
        width: 100%;
        background-color: #ffffff; 
        border-radius: 25px;       
        padding: 2px;              
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); 
    }

    .search-box input {
        flex: 1;                   
        background: transparent;   
        border: none;              
        outline: none;             
        padding: 10px 15px;        
        font-size: 14px;
        color: #333333;            
    }

    .search-box input::placeholder {
        color: #aaaaaa;            
    }

    .search-box button {
        background-color: #ffd4a7; 
        color: #ffffff;            
        border: none;              
        padding: 0 20px;           
        font-size: 14px;
        font-weight: bold;
        border-radius: 23px;       
        cursor: pointer;
        transition: all 0.2s ease; 
    }

    .search-box button:hover {
        background-color: #ffa545; 
        box-shadow: 0 2px 8px rgba(255, 165, 69, 0.4); 
    }

   
    .nav-links {
        display: flex;
        gap: 15px; 
        white-space: nowrap; 
    }

    .nav-links a {
        color: #ffffff;
        text-decoration: none;
        font-size: 20px;
        padding: 10px 15px;
        border-radius: 5px;
        transition: 0.3s ease;
    }

    .nav-links a:hover {
        background-color: rgba(255, 255, 255, 0.2);
        transform: scale(1.1);
    }

    .category-title {
        color: #ffffff; 
        font-size: 48px;
        text-align: left;
        max-width: 60%;
        margin: 25px auto 10px auto; 
        text-shadow: 1px 1px 3px #d6d6d6;
    }

    .category-row {
        background-color: #ffd4a7; 
        border-radius: 20px;       
        padding: 20px;             
        width: 60%;
        margin: 0 auto 40px auto; 
        display: flex;             
        flex-direction: row;       
        justify-content: center;   
        align-items: center;
        gap: 20px;         
        flex-wrap: wrap; 
    }

    .image-button {
      position: relative;   
      display: flex;
      flex-direction: column;
      width: 200px;
      height: 210px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 1px 1px 20px rgba(255,255,255,0.3);
      transition: transform 0.2s ease;
      text-decoration: none; 
    }

    .image-button img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .button-text {
      position: absolute;     
      bottom: 15px;        
      left: 15px;           
      color: rgb(255, 255, 255);        
      font-family: sans-serif;
      font-size: 16px;
      font-weight: bold;
      text-shadow: 1px 1px 10px rgba(0, 0, 0, 0.8); 
      background-color: rgba(255, 212, 167, 0.8); 
      border-radius: 5px; 
      padding: 4px 8px;
    }

    .image-button:hover {
      transform: translateY(-5px); 
    }

    @media (max-width: 1200px) {
        .category-row, .category-title {
            width: 85%;
        }
    }

    @media (max-width: 768px) {
        .navbar {
            flex-direction: column; 
            gap: 15px;
            padding: 15px;
            border-radius: 15px;
        }

        .nav-search {
            width: 100%; 
            margin: 5px 0;
        }

        .nav-links {
            justify-content: center;
            width: 100%;
            flex-wrap: wrap;
            gap: 10px;
        }

        .nav-links a {
            font-size: 16px;
            padding: 5px 10px;
        }

        .category-title {
            max-width: 90%;
            font-size: 32px;
            text-align: center;
        }

        .category-row {
            width: 90%;
            padding: 15px 10px;
            gap: 15px;
        }

        .image-button {
            width: calc(50% - 10px); 
            height: 180px;
            min-width: 135px;
        }

        .button-text {
            font-size: 14px;
            bottom: 8px;
            left: 8px;
            padding: 2px 6px;
        }
    }
  </style>
</head>
